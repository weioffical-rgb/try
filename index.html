<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人 - 專業版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); }
        
        /* [調整] 地板加高到 120px */
        #ground { 
            position: absolute; bottom: 0; width: 100%; height: 120px; 
            background-color: #f8f9fa; z-index: 10; 
            border-top: 4px solid rgba(0,0,0,0.05); 
        }

        #ui-hint { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #5d6d7e; font-size: 15px; font-weight: bold; z-index: 100;
            pointer-events: none; text-shadow: 0 0 5px white;
        }

        /* 角色主體 - bottom 從 120px 開始計算法 */
        #player {
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; bottom: 120px; left: 50%;
            transform: translateX(-50%);
            transform-origin: bottom center;
            border-radius: 14px; z-index: 15;
            box-shadow: 0 8px 15px rgba(255, 154, 158, 0.4);
            will-change: transform, left, bottom;
        }
        #eyes { position: absolute; top: 12px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: left 0.15s ease; }

        /* [調整] 虛擬按鈕放在地板內 */
        .controller {
            position: absolute; bottom: 20px; width: 100%; 
            z-index: 100; display: none; /* 預設隱藏，由 JS 開啟 */
            justify-content: space-between; padding: 0 25px; box-sizing: border-box;
            pointer-events: none;
        }
        .btn {
            width: 80px; height: 80px; 
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #ddd; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: #5d6d7e; font-size: 24px;
            pointer-events: auto; box-shadow: 0 4px 0 #ccc;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; background: #eee; }
        .left-controls { display: flex; gap: 20px; }

        /* 特效 */
        .jump-wave { position: absolute; left: 50%; bottom: -5px; width: 40px; height: 15px; border: 3px solid rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; animation: jumpWave 0.4s ease-out forwards; }
        @keyframes jumpWave { 0% { transform: translateX(-50%) scale(0.2); opacity: 0.8; } 100% { transform: translateX(-50%) scale(2.5); opacity: 0; } }
        @keyframes landSqueeze { 0% { transform: translateX(-50%) scaleX(1.6) scaleY(0.4); } 40% { transform: translateX(-50%) scaleX(0.8) scaleY(1.2); } 100% { transform: translateX(-50%) scaleX(1) scaleY(1); } }
        .land-effect { animation: landSqueeze 0.4s ease-out forwards !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-hint" id="hint-text">載入中...</div>
        
        <div id="player"><div id="eyes"></div></div>
        <div id="ground"></div>

        <div class="controller" id="mobile-ctrl">
            <div class="left-controls">
                <div class="btn" id="btn-left">←</div>
                <div class="btn" id="btn-right">→</div>
            </div>
            <div class="btn" id="btn-jump">跳</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const eyes = document.getElementById('eyes');
        const uiHint = document.getElementById('ui-hint');
        const mobileCtrl = document.getElementById('mobile-ctrl');

        let screenW = window.innerWidth;
        let playerX = screenW / 2;
        const GROUND_Y = 120; // 統一地板高度變數
        let playerY = GROUND_Y; 
        
        let yVelocity = 0;
        let moveVelocity = 0;
        let isJumping = false;
        let jumpCount = 0;
        let isLanding = false;

        const GRAVITY = 0.75;
        const JUMP_POWER = 16;
        const FRICTION = 0.88; 
        const accel = 1.2;
        const maxSpeed = 7;

        let moveState = { left: false, right: false };
        let facingRight = true;

        // [關鍵] 偵測裝置並調整介面
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouch) {
            mobileCtrl.style.display = 'flex';
            uiHint.innerHTML = "手機模式：使用下方按鈕操作";
        } else {
            mobileCtrl.style.display = 'none';
            uiHint.innerHTML = "電腦模式：使用 A / D 移動，空白鍵跳躍";
        }

        function update() {
            if (moveState.left) { moveVelocity -= accel; facingRight = false; }
            if (moveState.right) { moveVelocity += accel; facingRight = true; }
            
            moveVelocity *= FRICTION;
            if (Math.abs(moveVelocity) > maxSpeed) moveVelocity = maxSpeed * Math.sign(moveVelocity);
            
            playerX += moveVelocity;
            playerX = Math.max(25, Math.min(window.innerWidth - 25, playerX));

            if (isJumping || playerY > GROUND_Y) {
                yVelocity -= GRAVITY;
                playerY += yVelocity;
                if (playerY <= GROUND_Y) {
                    playerY = GROUND_Y; yVelocity = 0;
                    if (isJumping) triggerLandEffect();
                    isJumping = false; jumpCount = 0;
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            player.style.left = playerX + 'px';
            player.style.bottom = playerY + 'px';
            if (!isLanding) {
                let sY = 1;
                if (isJumping) sY = 1 + Math.abs(yVelocity) / 45;
                player.style.transform = `translateX(-50%) scaleX(${1/sY}) scaleY(${sY})`;
            }
            eyes.style.left = facingRight ? '32px' : '8px';
            eyes.style.top = (12 + (-yVelocity * 0.6)) + 'px';
        }

        function handleJump() {
            if (jumpCount < 2) {
                if (jumpCount === 1) {
                    const wave = document.createElement('div');
                    wave.className = 'jump-wave';
                    player.appendChild(wave);
                    setTimeout(() => wave.remove(), 400);
                }
                isJumping = true; yVelocity = JUMP_POWER; jumpCount++;
                isLanding = false; player.classList.remove('land-effect');
            }
        }

        function triggerLandEffect() {
            isLanding = true; player.classList.add('land-effect');
            setTimeout(() => { isLanding = false; player.classList.remove('land-effect'); }, 400);
        }

        // 綁定虛擬按鈕
        const bindBtn = (id, actionStart, actionEnd) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); actionStart(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); actionEnd(); });
        };

        if (isTouch) {
            bindBtn('btn-left', () => moveState.left = true, () => moveState.left = false);
            bindBtn('btn-right', () => moveState.right = true, () => moveState.right = false);
            bindBtn('btn-jump', () => handleJump(), () => {});
        }

        // 鍵盤監聽
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'a') moveState.left = true;
            if (key === 'd') moveState.right = true;
            if (key === ' ' || key === 'w') { e.preventDefault(); handleJump(); }
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'a') moveState.left = false;
            if (key === 'd') moveState.right = false;
        });

        update();
    </script>
</body>
</html>
