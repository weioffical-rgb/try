<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); }
        #ground { position: absolute; bottom: 0; width: 100%; height: 50px; background-color: #f8f9fa; z-index: 10; }

        /* 角色大小也改用螢幕寬度比例 (例如寬度的 12%)，並設定最大/最小像素防止變形 */
        #player {
            width: 12vw; 
            height: 12vw; 
            max-width: 60px; max-height: 60px;
            min-width: 40px; min-height: 40px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            transform-origin: bottom center;
            border-radius: 20%;
            z-index: 15;
            box-shadow: 0 8px 15px rgba(255, 154, 158, 0.4), inset 0 -4px 6px rgba(0,0,0,0.1);
        }

        #eyes { 
            position: absolute; top: 25%; 
            width: 20%; height: 20%; background: white; 
            border-radius: 50%; transition: left 0.2s ease;
        }

        #player-shadow {
            position: absolute; bottom: 45px; left: 50%; width: 10vw; max-width: 50px; height: 8px;
            background: rgba(0,0,0,0.1); border-radius: 50%; transform: translateX(-50%);
            filter: blur(3px); z-index: 5;
        }

        @keyframes extremeGoop {
            0% { transform: translateX(-50%) scaleX(1.7) scaleY(0.3); }
            25% { transform: translateX(-50%) scaleX(0.7) scaleY(1.4); }
            50% { transform: translateX(-50%) scaleX(1.2) scaleY(0.8); }
            100% { transform: translateX(-50%) scaleX(1) scaleY(1); }
        }
        .land-effect { animation: extremeGoop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="player"><div id="eyes"></div></div>
        <div id="player-shadow"></div>
        <div id="ground"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const shadow = document.getElementById('player-shadow');
        const eyes = document.getElementById('eyes');

        // --- 核心改動：依照螢幕比例計算數值 ---
        let screenW = window.innerWidth;
        let playerX = screenW / 2;
        let playerY = 50;
        let yVelocity = 0;
        let moveVelocity = 0;
        let isJumping = false;
        let jumpCount = 0;

        // 將物理數值定義為「螢幕寬度的百分比」
        // 這樣無論螢幕多大，小人橫越螢幕的時間都會一樣
        const getBaseValues = () => ({
            gravity: screenW * 0.0008,     // 重力
            jumpPower: screenW * 0.018,    // 跳躍力
            accel: screenW * 0.001,        // 加速度
            friction: 0.85,                // 摩擦力
            maxSpeed: screenW * 0.015      // 最高速度 (螢幕寬度的 1.5%)
        });

        let physics = getBaseValues();

        // 監聽螢幕大小縮放，重新計算比例
        window.addEventListener('resize', () => {
            screenW = window.innerWidth;
            physics = getBaseValues();
        });

        let moveState = { left: false, right: false };
        let facingRight = true;

        function update() {
            // 水平移動邏輯 (使用比例數值)
            if (moveState.left) { moveVelocity -= physics.accel; facingRight = false; }
            if (moveState.right) { moveVelocity += physics.accel; facingRight = true; }

            moveVelocity *= physics.friction;
            if (Math.abs(moveVelocity) > physics.maxSpeed) {
                moveVelocity = physics.maxSpeed * Math.sign(moveVelocity);
            }

            playerX += moveVelocity;

            // 邊界檢查
            const pWidth = player.offsetWidth / 2;
            playerX = Math.max(pWidth, Math.min(screenW - pWidth, playerX));

            // 跳躍物理 (使用比例數值)
            if (isJumping || playerY > 50) {
                yVelocity -= physics.gravity;
                playerY += yVelocity;
                if (playerY <= 50) {
                    playerY = 50;
                    if (isJumping) triggerLandEffect();
                    yVelocity = 0;
                    isJumping = false;
                    jumpCount = 0;
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            player.style.left = playerX + 'px';
            player.style.bottom = playerY + 'px';

            const hFactor = Math.min(1, (playerY - 50) / 400);
            shadow.style.left = playerX + 'px';
            shadow.style.opacity = 0.3 * (1 - hFactor);

            if (!player.classList.contains('land-effect')) {
                let scaleX = 1, scaleY = 1;
                if (isJumping) {
                    let stretch = 1 + Math.abs(yVelocity) / (screenW * 0.05);
                    scaleY = stretch;
                    scaleX = 1 / stretch;
                }
                player.style.transform = `translateX(-50%) scaleX(${scaleX}) scaleY(${scaleY})`;
            }

            // 眼睛位置也依照比例移動
            eyes.style.left = facingRight ? '65%' : '15%';
            let eyeY = -yVelocity * 0.5; 
            eyes.style.top = (25 + eyeY) + '%';
        }

        function handleJump() {
            if (jumpCount < maxJumps) {
                isJumping = true;
                yVelocity = physics.jumpPower;
                jumpCount++;
                player.classList.remove('land-effect');
            }
        }

        function triggerLandEffect() {
            player.classList.add('land-effect');
            setTimeout(() => player.classList.remove('land-effect'), 500);
        }

        // 事件監聽 (維持原本邏輯)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') moveState.left = true;
            if (e.key === 'd' || e.key === 'D') moveState.right = true;
            if (e.key === 'w' || e.key === 'W' || e.key === ' ') handleJump();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A') moveState.left = false;
            if (e.key === 'd' || e.key === 'D') moveState.right = false;
        });
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleJump();
            const tx = e.touches[e.touches.length - 1].clientX;
            if (tx < screenW / 2) { moveState.left = true; moveState.right = false; }
            else { moveState.right = true; moveState.left = false; }
        }, { passive: false });
        window.addEventListener('touchend', () => { moveState.left = false; moveState.right = false; });

        update();
    </script>
</body>
</html>
