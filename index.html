<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); cursor: pointer; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 50px; background-color: #f8f9fa; z-index: 10; }

        #ui-hint { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #5d6d7e; font-size: 16px; font-weight: bold; z-index: 100;
            pointer-events: none; text-shadow: 0 0 5px white;
        }

        #player {
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            transform-origin: bottom center;
            border-radius: 14px; z-index: 15;
            box-shadow: 0 8px 15px rgba(255, 154, 158, 0.4);
            will-change: transform, left, bottom;
        }

        #eyes { position: absolute; top: 12px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: left 0.15s ease; }

        #player-shadow {
            position: absolute; bottom: 45px; left: 50%; width: 50px; height: 8px;
            background: rgba(0,0,0,0.1); border-radius: 50%; transform: translateX(-50%);
            filter: blur(3px); z-index: 5;
        }

        @keyframes jumpWave {
            0% { transform: translateX(-50%) scale(0.2); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(2.5); opacity: 0; }
        }
        .jump-wave {
            position: absolute; left: 50%; bottom: -5px; width: 40px; height: 15px;
            border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 50%;
            pointer-events: none; animation: jumpWave 0.4s ease-out forwards;
        }

        @keyframes landSqueeze {
            0% { transform: translateX(-50%) scaleX(1.6) scaleY(0.4); }
            40% { transform: translateX(-50%) scaleX(0.8) scaleY(1.2); }
            100% { transform: translateX(-50%) scaleX(1) scaleY(1); }
        }
        .land-effect { animation: landSqueeze 0.4s ease-out forwards !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-hint">輕點跳躍 / 長按移動<br>AD 鍵或點擊螢幕左右</div>
        <div id="player"><div id="eyes"></div></div>
        <div id="player-shadow"></div>
        <div id="ground"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const shadow = document.getElementById('player-shadow');
        const eyes = document.getElementById('eyes');

        let screenW = window.innerWidth;
        let playerX = screenW / 2;
        let playerY = 50;
        let yVelocity = 0;
        let moveVelocity = 0;
        let isJumping = false;
        let jumpCount = 0;
        let isLanding = false;

        const GRAVITY = 0.75;
        const JUMP_POWER = 16;
        const FRICTION = 0.88; 

        let accel = screenW < 600 ? 1.2 : screenW * 0.001;
        let maxSpeed = screenW < 600 ? 6 : screenW * 0.015;

        window.addEventListener('resize', () => {
            screenW = window.innerWidth;
            accel = screenW < 600 ? 1.2 : screenW * 0.001;
            maxSpeed = screenW < 600 ? 6 : screenW * 0.015;
        });

        let moveState = { left: false, right: false };
        let facingRight = true;

        function update() {
            if (moveState.left) { moveVelocity -= accel; facingRight = false; }
            if (moveState.right) { moveVelocity += accel; facingRight = true; }
            
            moveVelocity *= FRICTION;
            if (Math.abs(moveVelocity) > maxSpeed) moveVelocity = maxSpeed * Math.sign(moveVelocity);
            
            playerX += moveVelocity;
            playerX = Math.max(25, Math.min(screenW - 25, playerX));

            if (isJumping || playerY > 50) {
                yVelocity -= GRAVITY;
                playerY += yVelocity;
                if (playerY <= 50) {
                    playerY = 50; yVelocity = 0;
                    if (isJumping) triggerLandEffect();
                    isJumping = false; jumpCount = 0;
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            player.style.left = playerX + 'px';
            player.style.bottom = playerY + 'px';
            const h = Math.min(1, (playerY - 50) / 400);
            shadow.style.left = playerX + 'px';
            shadow.style.opacity = 0.3 * (1 - h);

            if (!isLanding) {
                let sY = 1;
                if (isJumping) sY = 1 + Math.abs(yVelocity) / 45;
                player.style.transform = `translateX(-50%) scaleX(${1/sY}) scaleY(${sY})`;
            }
            eyes.style.left = facingRight ? '32px' : '8px';
            eyes.style.top = (12 + (-yVelocity * 0.6)) + 'px';
        }

        function handleJump() {
            if (jumpCount < 2) {
                if (jumpCount === 1) {
                    const wave = document.createElement('div');
                    wave.className = 'jump-wave';
                    wave.style.left = '50%';
                    player.appendChild(wave);
                    setTimeout(() => wave.remove(), 400);
                }
                isJumping = true; yVelocity = JUMP_POWER; jumpCount++;
                isLanding = false; player.classList.remove('land-effect');
            }
        }

        function triggerLandEffect() {
            isLanding = true; player.classList.add('land-effect');
            setTimeout(() => { isLanding = false; player.classList.remove('land-effect'); }, 400);
        }

        // --- 手機優化控制 ---
        let holdTimer = null;

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const tx = e.touches[0].clientX;
            handleJump(); // 點擊瞬間先跳躍

            // 如果按住超過 150 毫秒，才判定為移動
            holdTimer = setTimeout(() => {
                if (tx < window.innerWidth / 2) {
                    moveState.left = true;
                } else {
                    moveState.right = true;
                }
            }, 150); 
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            clearTimeout(holdTimer);
            if (e.touches.length === 0) {
                moveState.left = false;
                moveState.right = false;
            }
        });

        // 電腦控制
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') moveState.left = true;
            if (e.key.toLowerCase() === 'd') moveState.right = true;
            if (e.key === ' ' || e.key.toLowerCase() === 'w') { e.preventDefault(); handleJump(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'a') moveState.left = false;
            if (e.key.toLowerCase() === 'd') moveState.right = false;
        });
        window.addEventListener('mousedown', (e) => { if (e.button === 0) handleJump(); });

        update();
    </script>
</body>
</html>
